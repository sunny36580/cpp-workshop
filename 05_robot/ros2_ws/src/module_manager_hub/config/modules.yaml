# ========== 模块管理器中枢配置 ==========

# ---- ROS2 模块 ----
# launch_type: ros2_run | ros2_launch
modules:
  lower_body:
    launch_type: "ros2_launch"
    package: "ll_bringup"
    node_name: "ll_bringup.launch.py"
    working_dir: "/X1/ll_control"
    watch_topic: "/joint_states"
    enabled: false
    auto_start: false
    auto_restart: true
    timeout_sec: 5.0

  upper_body:
    launch_type: "ros2_run"
    package: "arm_function"
    node_name: "arm_hand_driver_node"
    working_dir: "/X1/arm"
    watch_topic: "/robot_arm_status"
    enabled: false
    auto_start: false
    auto_restart: true
    timeout_sec: 5.0

  imu_driver:
    launch_type: "ros2_run"
    package: "ros2_xsens_mti_driver"
    node_name: "xsens_mti_node"
    watch_topic: "/imu/data"
    enabled: false
    auto_start: false
    auto_restart: true
    timeout_sec: 5.0

  remote_interface:
    launch_type: "ros2_run"
    package: "ll_bringup"
    node_name: "humanoid_remote_interface"
    watch_topic: "/hwswitch"
    enabled: false
    auto_start: false
    auto_restart: true
    timeout_sec: 5.0

  # 测试用
  arm_controller:
    launch_type: "ros2_run"
    package: "module_manager_hub"
    node_name: "test_arm_controller_node"
    watch_topic: "/arm/status"
    enabled: true
    auto_start: true
    auto_restart: true
    timeout_sec: 1.0

# ---- 指令路由 ----
cmd_route:
  arm_control:
    topic: "/arm/control"
    msg_type: "Robotarmcontrol"

# ---- 脚本任务（UDP task 触发执行） ----
# name = task_N 与 UDP cmd_type=2 的 task_id 对应
script_tasks:
  task_1:
    description: "挥手脚本"
    script: "/X1/arm/scripts/wave.sh"
    enabled: false
  task_2:
    description: "握手脚本"
    script: "/X1/arm/scripts/handshake.sh"
    enabled: false
  task_3:
    description: "表演/展示脚本"
    script: "/X1/arm/scripts/perform.sh"
    enabled: false