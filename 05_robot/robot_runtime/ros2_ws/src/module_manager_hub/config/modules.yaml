# ========== module_manager_hub 配置 ==========
# 当前运行：CameraStreamer + HeartbeatCollector
# ModuleManager/SerialJoyBridge 阶段二启用

# ---- 心跳汇聚配置 ----
heartbeat:
  # 心跳文件目录（Runtime MonitorManager 读取）
  heartbeat_dir: "/tmp/module_heartbeats"
  # 超时阈值（秒）
  timeout_sec: 8.0
  # 被监控的服务（svc_id 为二进制 UDP 协议的服务 ID）
  targets:
    - name: camera_streamer
      svc_id: 1
      topic: "/camera/status"
      msg_type: "std_msgs/msg/Bool"
    - name: motion_service
      svc_id: 2
      topic: "/robot/motion/heartbeat"
      msg_type: "std_msgs/msg/String"
    - name: remote_control
      svc_id: 3
      topic: "/robot/remote_control/heartbeat"
      msg_type: "std_msgs/msg/String"
    - name: heartbeat_collector
      svc_id: 4
      topic: "/robot/collector/heartbeat"
      msg_type: "std_msgs/msg/String"