# ============================================================================
# Robot Runtime — Mode 配置
# ============================================================================
# Mode 定义了机器人的运行模式，切换模式时自动启停相关服务。
# ============================================================================

modes:

  # ---- 待机模式 ----
  # 只有基础运控
  standby:
    services:
      - motion

  # ---- 遥控模式 ----
  # 运控 + 图传 + 遥控
  teleop:
    services:
      - motion
      - remote_control

  # ---- 交互模式 ----
  # 对话 + 表情 + 手势（全部开启）
  interaction:
    services:
      - motion
      - conversation
      # - face
      # - gesture

  # ---- 调试模式 ----
  # 启动全部服务
  debug:
    services:
      - all

  # ---- 默认模式 ----
  default: teleop
