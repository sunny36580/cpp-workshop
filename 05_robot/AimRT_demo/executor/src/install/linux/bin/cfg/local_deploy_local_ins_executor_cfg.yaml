aimrt:
  log:
    core_lvl: INFO # Trace/Debug/Info/Warn/Error/Fatal/Off
    backends:
      - type: console
  module:
    pkgs:
      - path: ./libexecutor_pkg.so
        disable_modules: []
    modules:
      - name: ExecutorModule
        log_lvl: INFO
      - name: ExecutorCoModule
        log_lvl: INFO
      - name: ExecutorCoLoopModule
        log_lvl: INFO
      - name: RealTimeModule
        log_lvl: INFO

