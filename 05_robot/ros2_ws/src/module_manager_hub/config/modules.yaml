modules:
  leg_controller:
    node_name: "leg_controller_node"
    watch_topic: "/leg/state"          # 模块自身话题
    enabled: true
    auto_start: true
    timeout_sec: 1.0

  arm_controller:
    node_name: "arm_controller_node"
    watch_topic: "/arm/joint_states"   # 模块自身话题
    enabled: true
    auto_start: false
    timeout_sec: 1.0