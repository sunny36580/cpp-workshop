# ============================================================================
# TCP 远程管控 — 网络配置
# ============================================================================
# 内嵌在 Runtime 进程内的 TCP 服务端，供远程客户端连接并发送管控指令。
# 关闭 enabled 或删除本文件可完全禁用远程管控。
# ============================================================================
network:
  enabled: true
  port: 9527
  bind_addr: "0.0.0.0"
  auth_token: ""                  # 空字符串 = 不鉴权
  timeout_ms: 5000
  max_clients: 4
