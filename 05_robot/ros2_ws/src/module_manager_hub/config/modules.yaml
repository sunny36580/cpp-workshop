modules:
  power_manager:
    package_name: "power_manager"
    node_name: "power_manager_node"
    monitor_topic: "/power/heartbeat"
    enabled: true
    auto_start: true
    heartbeat_timeout: 1.0
    startup_timeout: 3.0
    max_restart_count: 3

  communication:
    package_name: "communication"
    node_name: "communication_node"
    monitor_topic: "/comm/heartbeat"
    enabled: true
    auto_start: true
    heartbeat_timeout: 0.5
    startup_timeout: 2.0
    max_restart_count: 3

  leg_controller:
    package_name: "leg_controller"
    node_name: "leg_controller_node"
    monitor_topic: "/leg/heartbeat"
    enabled: true
    auto_start: true
    heartbeat_timeout: 0.2
    startup_timeout: 5.0
    max_restart_count: 2

  balance_controller:
    package_name: "balance_controller"
    node_name: "balance_controller_node"
    monitor_topic: "/balance/heartbeat"
    enabled: true
    auto_start: true
    heartbeat_timeout: 0.1
    startup_timeout: 3.0
    max_restart_count: 2

  arm_controller:
    package_name: "arm_controller"
    node_name: "arm_controller_node"
    monitor_topic: "/arm/heartbeat"
    enabled: true
    auto_start: false
    heartbeat_timeout: 0.5
    startup_timeout: 2.0
    max_restart_count: 3