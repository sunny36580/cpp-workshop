modules:
  leg_controller:
    node_name: "leg_controller_node"
    monitor_topic: "/leg/heartbeat"
    enabled: true
    auto_start: true
    heartbeat_timeout: 1.0

  arm_controller:
    node_name: "arm_controller_node"
    monitor_topic: "/arm/heartbeat"
    enabled: true
    auto_start: false
    heartbeat_timeout: 1.0