# ============================================================================
# 全局监控阈值、自愈策略
# ============================================================================
monitor:
  check_interval: 3.0

  # ---- 文件心跳检测（监测业务进程是否卡死） ----
  file_heartbeat:
    enabled: true
    dir: "/tmp/runtime_hb"
    timeout_sec: 8.0

  detector:
    process:
      enabled: true
    topic:
      enabled: false
    tcp:
      enabled: false
    serial:
      enabled: false

  strategy:
    restart:
      max_retries: 3
      backoff_sec: 5
    degrade:
      enabled: true
    alert:
      enabled: true
