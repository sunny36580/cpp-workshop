# ============================================================================
# 全局监控阈值、自愈策略
# ============================================================================
monitor:
  check_interval: 3.0

  detector:
    process:
      enabled: true
    topic:
      enabled: false
    tcp:
      enabled: false
    serial:
      enabled: false

  # ---- ROS2 心跳话题订阅源 ----
  ros2_heartbeat:
    enabled: false
    topic_mapping:
      # topic_name: service_name
      - topic: "/heartbeat/motion"
        service: "motion"
      - topic: "/heartbeat/navigation"
        service: "navigation"

  strategy:
    restart:
      max_retries: 3
      backoff_sec: 5
    degrade:
      enabled: true
    alert:
      enabled: true
